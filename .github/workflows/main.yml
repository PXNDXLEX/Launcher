name: Android CI/CD Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4  # Actualizado de v3 a v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4 # Actualizado de v3 a v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Dar permisos de ejecución a Gradle
      run: chmod +x gradlew

    - name: Compilar APK Debug
      run: ./gradlew assembleDebug

    - name: Subir APK como artefacto
      uses: actions/upload-artifact@v4 # ACTUALIZACIÓN CRÍTICA: Cambiado de v3 a v4
      with:
        name: CarLauncher-APK
        path: app/build/outputs/apk/debug/app-debug.apk