name: Compilar Car Launcher

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Caché de Gradle (evita descargar todo en cada build) ────────────
      - name: Caché de Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 4. Permisos del wrapper ─────────────────────────────────────────────
      - name: Permisos gradlew
        run: chmod +x gradlew

      # ── 5. Compilar APK Debug ───────────────────────────────────────────────
      - name: Compilar APK Debug
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      # ── 6. Subir APK como artefacto ─────────────────────────────────────────
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: CarLauncher-Debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30