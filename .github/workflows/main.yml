name: Compilar Car Launcher

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Reparar Motor Gradle (Solución Windows a Linux)
      run: gradle wrapper --gradle-version 8.7
        
    - name: Compilar APK (Forzando Descargas)
      env:
        RAW_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
        RAW_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
      run: |
        # Limpiamos los tokens de espacios o saltos de línea invisibles que bloquean la red
        export MAPBOX_DOWNLOADS_TOKEN=$(echo -n "$RAW_DOWNLOADS_TOKEN" | tr -d '\n\r ')
        export MAPBOX_ACCESS_TOKEN=$(echo -n "$RAW_ACCESS_TOKEN" | tr -d '\n\r ')
        
        chmod +x gradlew
        # --refresh-dependencies obliga a Gradle a ignorar el caché y buscar Mapbox de nuevo
        ./gradlew :app:assembleDebug --refresh-dependencies
        
    - name: Subir APK
      uses: actions/upload-artifact@v4
      with:
        name: CarLauncher-APK
        path: app/build/outputs/apk/debug/app-debug.apk